<!DOCTYPE html>
<html>
<head>
    <title>Second Largest Number</title>
    <style>
        body{
            font-family: Arial;
            text-align:center;
            margin-top:100px;
        }

        button{
            padding:10px 20px;
            font-size:16px;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            font-size:20px;
            color:blue;
        }
    </style>
</head>

<body>

<h2>Find Second Largest Number</h2>

<p>Array: [23, 45, 67, 89, 12, 90, 44]</p>

<button onclick="findSecondLargest()">Find Second Largest</button>

<p id="result"></p>

<script>

function findSecondLargest(){

const arr = [23, 45, 67, 89, 12, 90, 44];

let largest = -Infinity;
let secondLargest = -Infinity;

for (let num of arr) {

    if (num > largest) {
        secondLargest = largest;
        largest = num;
    } 
    else if (num > secondLargest && num !== largest) {
        secondLargest = num;
    }

}

document.getElementById("result").innerText =
"Second Largest Number: " + secondLargest;

}

</script>

</body>
</html>
