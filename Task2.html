<!DOCTYPE html>
<html>
<head>
<title>Unique Elements Finder</title>

<style>
body{
font-family: Arial;
text-align:center;
margin-top:100px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:20px;
color:green;
}
</style>

</head>

<body>

<h2>Unique Elements from Two Arrays</h2>

<p>Array 1: [1, 2, 3, 4]</p>
<p>Array 2: [3, 4, 5, 6]</p>

<button onclick="showUnique()">Get Unique Elements</button>

<p id="result"></p>

<script>

function getUniqueElements(arr1, arr2) {
const combined = [...arr1, ...arr2];
const unique = [...new Set(combined)];
return unique;
}

function showUnique(){

const a = [1,2,3,4];
const b = [3,4,5,6];

const result = getUniqueElements(a,b);

document.getElementById("result").innerText =
"Unique Elements: " + result.join(", ");

}

</script>

</body>
</html>
